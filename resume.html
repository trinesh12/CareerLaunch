<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header class="mb-4">
        <div class="container">
            <h1 class="text-primary text-center">Resume Builder</h1>
            <p class="text-center text-muted">Build a professional resume preview instantly.</p>
        </div>
    </header>

    <main class="container mb-5" style="max-width: 1000px;">
        <div class="row gx-4">
            <div class="col-lg-6">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h2 class="h5 mb-3">Resume Details</h2>
                        <form id="resumeForm">
                            <div class="mb-3">
                                <label for="nameInput" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="nameInput" placeholder="Enter your name">
                            </div>
                            <div class="mb-3">
                                <label for="titleInput" class="form-label">Professional Title</label>
                                <input type="text" class="form-control" id="titleInput" placeholder="e.g. Front-End Developer">
                            </div>
                            <div class="mb-3">
                                <label for="emailInput" class="form-label">Email</label>
                                <input type="email" class="form-control" id="emailInput" placeholder="Enter your email">
                            </div>
                            <div class="mb-3">
                                <label for="phoneInput" class="form-label">Phone</label>
                                <input type="tel" class="form-control" id="phoneInput" placeholder="Enter your phone number">
                            </div>
                            <div class="mb-3">
                                <label for="summaryInput" class="form-label">Professional Summary</label>
                                <textarea class="form-control" id="summaryInput" rows="3" placeholder="Brief summary of your experience"></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="skillsInput" class="form-label">Skills</label>
                                <input type="text" class="form-control" id="skillsInput" placeholder="e.g. HTML, CSS, JavaScript">
                                <div class="form-text">Separate skills with commas.</div>
                            </div>
                            <div class="mb-3">
                                <label for="experienceInput" class="form-label">Experience</label>
                                <textarea class="form-control" id="experienceInput" rows="3" placeholder="List key work experience or accomplishments"></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="educationInput" class="form-label">Education</label>
                                <textarea class="form-control" id="educationInput" rows="2" placeholder="Highest education or certifications"></textarea>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Generate Preview</button>
                                <button type="button" id="copyButton" class="btn btn-outline-secondary">Copy Resume</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card shadow-sm preview-card">
                    <div class="card-body">
                        <h2 class="h5 mb-3">Live Preview</h2>
                        <div id="resumePreview" class="resume-preview text-muted">
                            <p class="mb-0">Complete the form and click <strong>Generate Preview</strong> to see your resume here.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
